<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Cat Program Challenge</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 {
            color: #2c3e50;
            margin: 0 0 5px 0;
            font-size: 26px;
        }

        p {
            color: #7f8c8d;
            margin: 0 0 15px 0;
            font-size: 14px;
            text-align: center;
        }

        /* Side-by-Side Viewport Design */
        #workspaces-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            height: 78vh;
            gap: 20px;
        }

        .workspace-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            border: 2px solid #e2e8f0;
        }

        .workspace-header {
            padding: 10px 15px;
            font-weight: bold;
            color: white;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left { background-color: #4a75a0; }
        .header-right { background-color: #ffab19; }

        .blockly-div {
            width: 100%;
            height: 100%;
        }

        /* Celebration Overlays */
        #celebration-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        #success-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 30px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 10000;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #success-banner.show {
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        #success-banner h2 {
            margin: 0 0 10px 0;
            color: #27ae60;
            font-size: 32px;
        }

        #success-banner p {
            font-size: 18px;
            color: #34495e;
            margin: 0;
        }
    </style>
</head>
<body>

    <h1>Scratch Cat Match Challenge</h1>
    <p>Complete the sentence code sequence on the left and the matching Scratch blocks on the right to win!</p>

    <div id="workspaces-container">
        <div class="workspace-card">
            <div class="workspace-header header-left"><span>1. Sentence Code View</span></div>
            <div id="leftBlockly" class="blockly-div"></div>
        </div>

        <div class="workspace-card">
            <div class="workspace-header header-right"><span>2. Scratch Block View</span></div>
            <div id="rightBlockly" class="blockly-div"></div>
        </div>
    </div>

    <xml id="leftToolbox" style="display: none">
        <block type="cat_countdown"></block>
        <block type="cat_repeat"></block>
        <block type="cat_rotate"></block>
    </xml>

    <xml id="rightToolbox" style="display: none">
        <block type="scratch_countdown"></block>
        <block type="scratch_repeat"></block>
        <block type="scratch_turn"></block>
    </xml>

    <canvas id="celebration-canvas"></canvas>
    <div id="success-banner" id="banner">
        <h2>🎉 Brilliant Job! 🎉</h2>
        <p>Both programs match perfectly!</p>
    </div>

    <script>
        let animationActive = false;
        let particles = [];
        const canvas = document.getElementById('celebration-canvas');
        const ctx = canvas.getContext('2d');

        // Resize celebration canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 1. Define Custom Left Blocks (Sentence Style) ---
        Blockly.Blocks['cat_start'] = {
            init: function() {
                this.appendDummyInput().appendField("The scratch cat will start its program");
                this.setNextStatement(true, null);
                this.setColour("#4a75a0");
            }
        };

        Blockly.Blocks['cat_countdown'] = {
            init: function() {
                this.appendDummyInput().appendField("The scratch cat will do a 3 second countdown");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#5c94cc");
            }
        };

        Blockly.Blocks['cat_repeat'] = {
            init: function() {
                this.appendDummyInput().appendField("The cat will repeat this action 30 times");
                this.appendStatementInput("DO").setCheck(null);
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#5c94cc");
            }
        };

        Blockly.Blocks['cat_rotate'] = {
            init: function() {
                this.appendDummyInput().appendField("The cat will rotate 80 degrees clockwise");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#5c94cc");
            }
        };

        // --- 2. Define Custom Right Blocks (Scratch Block Look) ---
        Blockly.Blocks['scratch_start'] = {
            init: function() {
                this.appendDummyInput().appendField("when green flag clicked");
                this.setNextStatement(true, null);
                this.setColour("#ffbf00"); // Scratch Hat Yellow
            }
        };

        Blockly.Blocks['scratch_countdown'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("say ")
                    .appendField(new Blockly.FieldLabel("3"), "S3")
                    .appendField(" for 1 seconds")
                    .appendField(" say 2 for 1 seconds say 1 for 1 seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#9966ff"); // Scratch Looks Purple
            }
        };

        // Custom multi-line simplified display for layout matching
        Blockly.Blocks['scratch_countdown'] = {
            init: function() {
                this.appendDummyInput().appendField("say [3] for (1) secs");
                this.appendDummyInput().appendField("say [2] for (1) secs");
                this.appendDummyInput().appendField("say [1] for (1) secs");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#9966ff");
            }
        };

        Blockly.Blocks['scratch_repeat'] = {
            init: function() {
                this.appendDummyInput().appendField("repeat 30");
                this.appendStatementInput("DO").setCheck(null);
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#ffab19"); // Scratch Control Orange
            }
        };

        Blockly.Blocks['scratch_turn'] = {
            init: function() {
                this.appendDummyInput().appendField("turn ↻ 80 degrees");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#4c97ff"); // Scratch Motion Blue
            }
        };

        // --- 3. Inject Both Workspaces ---
        const options = (toolboxId) => ({
            toolbox: document.getElementById(toolboxId),
            scrollbars: false,
            trashcan: true,
            grid: { spacing: 20, length: 3, colour: '#ddd', snap: true }
        });

        const leftWorkspace = Blockly.inject('leftBlockly', options('leftToolbox'));
        const rightWorkspace = Blockly.inject('rightBlockly', options('rightToolbox'));

        // --- 4. Setup Fixed Starting Anchors ---
        const leftStart = leftWorkspace.newBlock('cat_start');
        leftStart.initSvg(); leftStart.render(); leftStart.moveBy(40, 40);
        leftStart.setMovable(false); leftStart.setDeletable(false);

        const rightStart = rightWorkspace.newBlock('scratch_start');
        rightStart.initSvg(); rightStart.render(); rightStart.moveBy(40, 40);
        rightStart.setMovable(false); rightStart.setDeletable(false);


        // --- 5. Validation Check Logic ---
        function checkAnswers() {
            // Target structure check
            // Target Sequence: Start -> Countdown -> Repeat (containing Rotate)
            
            // Validate Left Workspace
            const bLeft1 = leftStart.getNextBlock();
            const leftValid = bLeft1 && bLeft1.type === 'cat_countdown' &&
                              bLeft1.getNextBlock() && bLeft1.getNextBlock().type === 'cat_repeat' &&
                              bLeft1.getNextBlock().getInputTargetBlock('DO') && 
                              bLeft1.getNextBlock().getInputTargetBlock('DO').type === 'cat_rotate';

            // Validate Right Workspace
            const bRight1 = rightStart.getNextBlock();
            const rightValid = bRight1 && bRight1.type === 'scratch_countdown' &&
                               bRight1.getNextBlock() && bRight1.getNextBlock().type === 'scratch_repeat' &&
                               bRight1.getNextBlock().getInputTargetBlock('DO') && 
                               bRight1.getNextBlock().getInputTargetBlock('DO').type === 'scratch_turn';

            if (leftValid && rightValid) {
                if (!animationActive) startCelebration();
            } else {
                stopCelebration();
            }
        }

        leftWorkspace.addChangeListener(checkAnswers);
        rightWorkspace.addChangeListener(checkAnswers);


        // --- 6. Particle Emojis & Sparkles Effect Engine ---
        function startCelebration() {
            animationActive = true;
            document.getElementById('success-banner').classList.add('show');
            particles = [];
            
            // Create Emojis
            const emojis = ['✨', '🐱', '🎉', '💻', '⭐', '🎈'];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * -canvas.height,
                    type: 'emoji',
                    char: emojis[Math.floor(Math.random() * emojis.length)],
                    size: Math.random() * 24 + 16,
                    speedY: Math.random() * 3 + 2,
                    speedX: Math.random() * 2 - 1
                });
            }

            // Create Sparkles
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    type: 'sparkle',
                    radius: Math.random() * 3 + 1,
                    color: `hsla(${Math.random() * 360}, 100%, 70%, 1)`,
                    speedY: Math.random() * -1 - 0.5,
                    speedX: Math.random() * 2 - 1,
                    alpha: 1,
                    decay: Math.random() * 0.02 + 0.01
                });
            }
            
            requestAnimationFrame(updateParticles);
        }

        function stopCelebration() {
            animationActive = false;
            document.getElementById('success-banner').classList.remove('show');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function updateParticles() {
            if (!animationActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p) => {
                if (p.type === 'emoji') {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    ctx.font = `${p.size}px serif`;
                    ctx.fillText(p.char, p.x, p.y);
                    
                    // Reset if fallen past screen
                    if (p.y > canvas.height) {
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                } else if (p.type === 'sparkle') {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.alpha -= p.decay;
                    
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.restore();

                    // Respawn expired sparkles
                    if (p.alpha <= 0) {
                        p.x = Math.random() * canvas.width;
                        p.y = Math.random() * canvas.height;
                        p.alpha = 1;
                    }
                }
            });

            requestAnimationFrame(updateParticles);
        }
    </script>
</body>
</html>
